<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lua — Dashboard</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#C2185B" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body class="app-page">

  <!-- Top Bar -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="header-logo">
        <img src="/icons/logo.svg" alt="Lua" style="height:36px;width:auto;" />
      </div>
      <button class="btn-icon" id="btn-settings" aria-label="Definições">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <!-- Cycle Ring -->
    <section class="cycle-hero" aria-label="Estado atual do ciclo">
      <div class="cycle-ring-wrap">
        <svg class="cycle-ring" viewBox="0 0 200 200" aria-hidden="true">
          <circle class="ring-bg" cx="100" cy="100" r="80" />
          <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="80"
            stroke-dasharray="502.65"
            stroke-dashoffset="502.65"
            transform="rotate(-90 100 100)" />
        </svg>
        <div class="cycle-ring-content" id="btn-phase-info" role="button" tabindex="0" aria-label="Ver explicação da fase atual" style="cursor:pointer">
          <div class="cycle-day-label">Dia</div>
          <div class="cycle-day" id="cycle-day">—</div>
          <div class="cycle-phase" id="cycle-phase">A carregar…</div>
        </div>
      </div>
      <div class="cycle-meta">
        <div class="meta-item">
          <span class="meta-label">Fase</span>
          <span class="meta-value" id="phase-name">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Próx. período</span>
          <span class="meta-value" id="next-period">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Fertilidade</span>
          <span class="meta-value" id="fertility-status">—</span>
        </div>
      </div>
    </section>

    <!-- Quick Log -->
    <section class="quick-log">
      <h2 class="section-title">Registo de Hoje</h2>
      <a href="/daily-log.html" class="quick-log-card" id="quick-log-card">
        <div class="quick-log-icon">✏️</div>
        <div class="quick-log-text">
          <span class="quick-log-title">Registar como te sentes</span>
          <span class="quick-log-sub">Humor, sintomas, fluxo e dor</span>
        </div>
        <svg class="quick-log-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>
      <button class="quick-log-card quick-period-btn" id="btn-mark-period" style="width:100%;border:none;cursor:pointer;margin-top:10px;background:var(--clr-surface);">
        <div class="quick-log-icon">🩸</div>
        <div class="quick-log-text">
          <span class="quick-log-title">Registar início do período</span>
          <span class="quick-log-sub">Atualizar data do ciclo</span>
        </div>
      </button>
      <div id="period-date-picker" hidden style="margin-top:12px;padding:16px;background:var(--clr-surface);border-radius:12px;">
        <label style="display:block;font-size:14px;color:var(--clr-text-secondary);margin-bottom:8px;">Quando começou o teu período?</label>
        <input type="date" id="period-date-input" style="width:100%;padding:10px;border:1px solid var(--clr-border);border-radius:8px;font-size:16px;color:var(--clr-text);background:var(--clr-bg);box-sizing:border-box;" />
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button id="btn-period-cancel" class="btn btn-outline" style="flex:1;">Cancelar</button>
          <button id="btn-period-confirm" class="btn btn-primary" style="flex:1;">Confirmar</button>
        </div>
      </div>
    </section>

    <!-- Upcoming Events -->
    <section class="upcoming">
      <h2 class="section-title">Próximos Eventos</h2>
      <div class="events-list" id="events-list">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <!-- Insights -->
    <section class="insights">
      <h2 class="section-title">Dicas para Hoje</h2>
      <div class="insight-card" id="insight-card">
        <p id="insight-text">A carregar…</p>
      </div>
    </section>
  </main>

  <!-- Phase Info Modal -->
  <div class="phase-modal-overlay" id="phase-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-phase-title">
    <div class="phase-modal">
      <div class="phase-modal-header" id="modal-phase-header">
        <span class="phase-modal-icon" id="modal-phase-icon"></span>
        <h2 class="phase-modal-title" id="modal-phase-title"></h2>
        <button class="phase-modal-close" id="btn-close-modal" aria-label="Fechar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="phase-modal-body">
        <p class="phase-modal-desc" id="modal-phase-desc"></p>
        <div class="phase-modal-stats" id="modal-phase-stats"></div>
        <div class="phase-modal-tips" id="modal-phase-tips"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" aria-label="Navegação principal">
    <a href="/dashboard.html" class="nav-item active" aria-current="page">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <span>Hoje</span>
    </a>
    <a href="/calendar.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Calendário</span>
    </a>
    <a href="/daily-log.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Registo</span>
    </a>
    <a href="/partner.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span>Parceiro</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cycle.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
