<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lua — Recuperar Palavra-passe</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#C2185B" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <a href="/" aria-label="Voltar ao início">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <path d="M32 24c0 4.418-3.582 8-8 8s-8-3.582-8-8 3.582-8 8-8c1.105 0 2.16.224 3.117.629C25.457 17.826 24 20.742 24 24s1.457 6.174 3.117 7.371A8.003 8.003 0 0032 24z" fill="var(--color-primary)"/>
        </svg>
      </a>
    </div>
    <h1 class="auth-heading">Recuperar palavra-passe</h1>
    <p class="auth-sub">Envia-nos o teu email e enviamos um link de recuperação.</p>

    <form id="forgot-form" class="auth-form active" novalidate>
      <div class="form-group">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" name="email" autocomplete="email" required placeholder="o.teu@email.com" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enviar link</button>
      <div id="forgot-success" class="form-success" role="status" hidden>Email enviado! Verifica a tua caixa de correio.</div>
      <div id="forgot-error" class="form-error" role="alert" hidden></div>
    </form>

    <a href="/" class="back-link">← Voltar ao login</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
