<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lua — Calendário</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#C2185B" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/calendar.css" />
</head>
<body class="app-page">

  <header class="app-header">
    <div class="app-header-inner">
      <button class="btn-icon" id="btn-prev-month" aria-label="Mês anterior">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="header-month" id="calendar-month-label">—</h1>
      <button class="btn-icon" id="btn-next-month" aria-label="Mês seguinte">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <!-- Legend -->
    <div class="calendar-legend" role="list" aria-label="Legenda de fases">
      <div class="legend-item" role="listitem"><span class="legend-dot phase-menstrual"></span> Menstruação</div>
      <div class="legend-item" role="listitem"><span class="legend-dot phase-follicular"></span> Folicular</div>
      <div class="legend-item" role="listitem"><span class="legend-dot phase-ovulation"></span> Ovulação</div>
      <div class="legend-item" role="listitem"><span class="legend-dot phase-luteal"></span> Lútea</div>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-grid-wrap">
      <div class="calendar-weekdays" aria-hidden="true">
        <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
      </div>
      <div class="calendar-grid" id="calendar-grid" role="grid" aria-label="Calendário menstrual"></div>
    </div>

    <!-- Selected Day Detail -->
    <div class="day-detail" id="day-detail" hidden>
      <h2 class="day-detail-date" id="day-detail-date"></h2>
      <div class="day-detail-phase" id="day-detail-phase"></div>
      <div class="day-detail-log" id="day-detail-log">
        <p class="no-log">Sem registo para este dia.</p>
      </div>
      <a href="/daily-log.html" class="btn btn-outline btn-sm" id="day-detail-log-link">Ver / Editar registo</a>
    </div>
  </main>

  <nav class="bottom-nav" aria-label="Navegação principal">
    <a href="/dashboard.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <span>Hoje</span>
    </a>
    <a href="/calendar.html" class="nav-item active" aria-current="page">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Calendário</span>
    </a>
    <a href="/daily-log.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Registo</span>
    </a>
    <a href="/partner.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span>Parceiro</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cycle.js"></script>
  <script src="/js/calendar.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
